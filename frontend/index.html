<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Αθηνόραμα Αρχείο Ταινιών</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2"  y1="8"  x2="6"  y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="18" y1="8"  x2="22" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2"  y1="16" x2="6"  y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="18" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8"  y1="4"  x2="8"  y2="20" stroke="currentColor" stroke-width="1.5"/>
          <line x1="16" y1="4"  x2="16" y2="20" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Αθηνόραμα</div>
        <div class="logo-sub">Αρχείο Ταινιών</div>
      </div>
    </div>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-tab="archive">🎬 Αρχείο</button>
      <button class="nav-tab" data-tab="mylist">⭐ Η Λίστα μου</button>
    </nav>

    <div class="header-right">
      <span class="movie-total-count" id="movieTotalCount"></span>
      <button class="btn-icon" id="adminBtn" title="Διαχείριση / Scraping">⚙</button>
    </div>
  </div>
</header>

<!-- ========== ARCHIVE TAB ========== -->
<div id="archiveTab">
  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="filter-section">
        <div class="filter-section-header">
          <span class="filter-section-icon">🔍</span>
          <span class="filter-section-title">Αναζήτηση</span>
        </div>
        <input type="text" id="searchInput" placeholder="Τίτλος, σκηνοθέτης..." />
      </div>

      <div class="filter-section">
        <div class="filter-section-header">
          <span class="filter-section-icon">📅</span>
          <span class="filter-section-title">Έτος</span>
        </div>
        <div class="filter-range-inline">
          <input type="number" id="yearFrom" placeholder="Από" min="1900" max="2099" />
          <span class="filter-range-sep">Έως</span>
          <input type="number" id="yearTo"   placeholder=""    min="1900" max="2099" />
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-section-header">
          <span class="filter-section-icon">⭐</span>
          <span class="filter-section-title">Αστεράκια Αθηνόραμα</span>
        </div>
        <div class="filter-range-inline">
          <input type="number" id="starsMin" placeholder="Ελάχ." min="1" max="5" step="0.5" />
          <span class="filter-range-sep">—</span>
          <input type="number" id="starsMax" placeholder="Μέγ."  min="1" max="5" step="0.5" />
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-section-header">
          <span class="filter-section-icon">🌍</span>
          <span class="filter-section-title">Χώρα</span>
        </div>
        <select id="countrySelect">
          <option value="">Επιλογή χώρας...</option>
        </select>
      </div>

      <div class="filter-section">
        <div class="filter-section-header">
          <span class="filter-section-icon">🎭</span>
          <span class="filter-section-title">Είδος</span>
        </div>
        <select id="genreSelect">
          <option value="">Επιλογή είδους...</option>
        </select>
      </div>

      <div class="filter-section">
        <div class="filter-section-header">
          <span class="filter-section-icon">⏱</span>
          <span class="filter-section-title">Διάρκεια (λεπτά)</span>
        </div>
        <div class="filter-range">
          <input type="number" id="durMin" placeholder="Min" min="1" />
          <input type="number" id="durMax" placeholder="Max" min="1" />
        </div>
      </div>

      <hr class="sidebar-divider" />

      <button class="btn-clear-filters" id="clearFiltersBtn">⊘ Καθαρισμός φίλτρων</button>

    </aside>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="results-count" id="resultsCount"></span>
          <button class="btn-random" id="randomBtn">🎲 Τυχαία</button>
        </div>
        <div class="toolbar-right">
          <div class="toolbar-sort-group">
            <span class="toolbar-label">Ταξινόμηση:</span>
            <select class="toolbar-select" id="sortBy">
              <option value="year">Έτος</option>
              <option value="stars">Αστεράκια</option>
              <option value="title">Τίτλος</option>
              <option value="duration">Διάρκεια</option>
            </select>
            <button class="sort-dir-btn" id="sortDirBtn" title="Αλλαγή κατεύθυνσης">↓</button>
          </div>
          <div class="toolbar-select-wrap">
            <select class="toolbar-select" id="pageSelect">
              <option value="1">1</option>
            </select>
          </div>
          <div class="toolbar-select-wrap">
            <select class="toolbar-select" id="perPage">
              <option value="24">24</option>
              <option value="48">48</option>
              <option value="96">96</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Movie grid -->
      <div class="movie-grid" id="movieGrid"></div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>

    </div><!-- /content-area -->
  </div><!-- /app-body -->
</div><!-- /archiveTab -->

<!-- ========== MY LIST TAB ========== -->
<div id="mylistTab" class="list-panel">
  <div class="app-body">
    <div class="content-area">

      <div class="list-subtabs">
        <button class="list-subtab active" data-listtype="seen">👁 Έχω δει</button>
        <button class="list-subtab" data-listtype="favourite">⭐ Αγαπημένα</button>
        <button class="list-subtab" data-listtype="series_seen">📺 Σειρές (είδα)</button>
        <button class="list-subtab" data-listtype="series_favourite">💎 Αγαπημένες σειρές</button>
      </div>

      <div class="list-toolbar">
        <input type="text" id="listSearch" placeholder="Αναζήτηση στη λίστα…" />
        <select id="listGenre">
          <option value="">Όλα τα είδη</option>
        </select>
        <button class="btn-admin-action" id="syncSheetsBtn">🔄 Sync από Sheets</button>
      </div>

      <div class="movie-grid" id="userGrid"></div>

    </div>
  </div>
</div>

<!-- ========== MOVIE MODAL ========== -->
<div class="modal-overlay hidden" id="movieModal">
  <div class="modal" role="dialog" aria-modal="true">

    <!-- Top bar: title + close -->
    <div class="modal-topbar">
      <div class="modal-topbar-titles">
        <div class="modal-title"    id="modalTitle"></div>
        <div class="modal-original" id="modalOriginal"></div>
      </div>
      <button class="modal-topbar-close" id="modalTopbarClose" aria-label="Κλείσιμο">✕</button>
    </div>

    <!-- Main: poster + info -->
    <div class="modal-main">
      <div class="modal-poster" id="modalPoster"></div>
      <div class="modal-info">
        <div class="modal-stars"  id="modalStars"></div>
        <div class="modal-meta"   id="modalMeta"></div>
        <div class="modal-scores" id="modalScores"></div>
        <div id="modalListBadge"></div>
      </div>
    </div>

    <!-- Description -->
    <div class="modal-description" id="modalDescSection" style="display:none;">
      <div id="modalDesc"></div>
    </div>

    <!-- Similar movies -->
    <div class="modal-similar" id="modalSimilarSection" style="display:none;">
      <div class="modal-section-title">Παρόμοιες ταινίες</div>
      <div class="modal-section-content" id="modalSimilar"></div>
    </div>

    <!-- Trailer -->
    <div class="modal-trailer" id="modalTrailerSection" style="display:none;">
      <div class="modal-trailer-wrap" id="modalTrailerWrap">
        <div class="modal-trailer-loading" id="modalTrailerLoading">Φόρτωση trailer…</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <div class="modal-footer-left">
        <button class="btn-nav"    id="modalPrevBtn"    title="Προηγούμενη" disabled>‹</button>
        <button class="btn-nav"    id="modalNextBtn"    title="Επόμενη"     disabled>›</button>
        <button class="btn-random" id="modalRandomBtn">🎲 Τυχαία</button>
      </div>
      <div class="modal-footer-right">
        <div class="dropdown-wrap">
          <button class="btn-primary" id="addToListBtn">+ Λίστα</button>
          <div class="dropdown-menu" id="addToListMenu">
            <button class="dropdown-item" data-listtype="seen">👁 Ταινίες που έχω δει</button>
            <button class="dropdown-item" data-listtype="favourite">⭐ Αγαπημένες ταινίες</button>
            <button class="dropdown-item" data-listtype="series_seen">📺 Σειρές που έχω δει</button>
            <button class="dropdown-item" data-listtype="series_favourite">💎 Αγαπημένες σειρές</button>
          </div>
        </div>
        <a class="btn-secondary" id="modalAthinoramaLink" href="#" target="_blank" rel="noopener">↗ Athinorama</a>
        <a class="btn-secondary hidden" id="modalTrailerLink" href="#" target="_blank" rel="noopener">▶ Trailer</a>
        <button class="btn-close-modal" id="modalClose">Κλείσιμο</button>
      </div>
    </div>

  </div>
</div>

<!-- ========== ADMIN / SCRAPE PANEL ========== -->
<div class="admin-overlay hidden" id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-title">⚙ Διαχείριση Scraping</div>

    <div class="admin-row">
      <label>API Key</label>
      <input type="password" class="admin-key-input" id="scrapeKey" placeholder="SCRAPE_API_KEY" />
    </div>

    <div class="admin-row">
      <label>Mode</label>
      <select id="scrapeMode" style="flex:1; width:auto;">
        <option value="incremental">Incremental (νέες μόνο)</option>
        <option value="full">Full (όλο το αρχείο)</option>
      </select>
    </div>

    <div class="admin-row">
      <div class="admin-toggle">
        <div class="toggle-switch" id="fullRescrapeToggle"><div class="toggle-knob"></div></div>
        <span>Full rescrape (αντικατάσταση υπαρχόντων)</span>
      </div>
    </div>

    <div class="admin-row">
      <button class="btn-admin-action accent" id="startScrapeBtn">▶ Έναρξη</button>
      <button class="btn-admin-action"        id="refreshStatusBtn">↺ Status</button>
      <button class="btn-admin-close"         id="adminClose">✕</button>
    </div>

    <div class="progress-wrap" id="scrapeProgressWrap" style="display:none;">
      <div class="progress-bar" id="scrapeProgressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="scrapeProgressLabel"></div>
    <div class="admin-status hidden" id="adminStatus"></div>
  </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
</body>
</html>
